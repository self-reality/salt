<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- The page lives under /scripts/ but the lib's default asset base paths
       ('elements/svg elements/', 'elements/…') are authored relative to the
       document. <base href="/"> makes every relative URL resolve against the
       server root so those defaults keep working with zero lib changes. -->
  <base href="/" />
  <title>Prerender (headless)</title>

  <!-- Same importmap as index.html. Only the model outputs import THREE (lazily,
       from scripts/prerender-model.js); texture-only runs never touch it. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <script type="module" src="/scripts/prerender-page.js"></script>
</body>
</html>
