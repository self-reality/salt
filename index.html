<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SALT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; }
    canvas { display: block; }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1.2rem;
      color: #888;
      z-index: 10;
      transition: opacity 0.5s;
    }
    .value-display {
      min-width: 3.2rem;
      text-align: right;
      font-size: 0.8rem;
      font-variant-numeric: tabular-nums;
      opacity: 0.8;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    /* Landing page header */
    .landing-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 8;
      padding: 3rem 2rem 1.5rem;
      text-align: center;
      pointer-events: none;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .landing-header h1 {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      margin: 0;
      color: #111;
    }
    .landing-header .subtitle {
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin: 0.4rem 0 0;
    }
    .landing-header .description {
      font-size: 0.8rem;
      color: #aaa;
      margin: 1.5rem auto 0;
      max-width: 320px;
      line-height: 1.6;
    }

    /* Queue scene UI */
    .queue-ui { display: none; }
    .queue-ui.visible { display: block; }

    .queue-overlay {
      position: fixed;
      bottom: 166px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-family: Menlo, Monaco, 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      padding: 8px 16px;
      border-radius: 8px;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
      z-index: 1000;
    }

    .queue-pause-btn {
      position: fixed;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-family: Menlo, Monaco, 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      pointer-events: auto;
      white-space: nowrap;
      z-index: 1001;
    }

    .queue-search {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      z-index: 1002;
      pointer-events: auto;
    }
    .queue-search input {
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-family: Menlo, Monaco, 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      outline: none;
      width: 180px;
    }
    .queue-search button {
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-family: Menlo, Monaco, 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .controls-panel {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.9rem;
      color: #333;
      background: rgba(255,255,255,0);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .controls-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .controls-panel-header-title {
      font-weight: 600;
    }
    .controls-panel.collapsed #controls-panel-body {
      display: none;
    }
    .controls-panel label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }
    .controls-panel input[type="file"] {
      font-size: 0.85rem;
    }
    .controls-panel button {
      font-size: 0.85rem;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
    }
    .controls-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .controls-section-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .controls-section-title::after {
      content: '▾';
      font-size: 0.8rem;
      opacity: 0.7;
    }
    .controls-group.collapsed .controls-section-title::after {
      content: '▸';
    }
    .controls-group.collapsed > :not(.controls-section-title) {
      display: none;
    }
    .stretch-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .stretch-row label {
      min-width: 3.2rem;
    }
    .stretch-row input[type="range"] {
      flex: 1;
    }
    .stretch-row input[type="number"] {
      width: 4.2rem;
      padding: 0.1rem 0.25rem;
      font-size: 0.85rem;
    }
    .hidden {
      display: none;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loading">Loading model…</div>

  <header class="landing-header" id="landing-header">
    <h1>SALT</h1>
    <p class="subtitle">Space Archive Latent The</p>
    <p class="description">Placeholder text block</p>
  </header>

  <div id="queue-ui" class="queue-ui">
    <div id="queue-overlay" class="queue-overlay"></div>
    <button type="button" id="queue-pause" class="queue-pause-btn" aria-label="Pause artwork cycling">Pause</button>
    <div id="queue-search" class="queue-search">
      <input type="text" id="queue-search-input" placeholder="Artist name…" />
      <button type="button" id="queue-search-btn">Search</button>
    </div>
  </div>

  <div id="controls-panel" class="controls-panel">
    <div class="controls-panel-header">
      <span class="controls-panel-header-title">Controls</span>
      <button type="button" id="toggle-controls-panel">Hide controls</button>
    </div>
    <div id="controls-panel-body">
      <div class="controls-group">
        <div class="controls-section-title">Artwork</div>
        <label>
          Artwork image
          <input type="file" id="decal-file" accept="image/*" />
        </label>
        <div>Placed at (167,504), size 227×256</div>
      </div>

      <div id="stretch-section" class="controls-group hidden">
        <div class="controls-section-title">Stretch</div>
        <div class="stretch-row">
          <label for="stretch-x">X</label>
          <input type="range" id="stretch-x" min="0" max="10" step="0.01" />
          <input type="number" id="stretch-x-input" step="0.01" />
        </div>
        <div class="stretch-row">
          <label for="stretch-y">Y</label>
          <input type="range" id="stretch-y" min="0" max="10" step="0.01" />
          <input type="number" id="stretch-y-input" step="0.01" />
        </div>
        <div class="stretch-row">
          <label for="stretch-z">Z</label>
          <input type="range" id="stretch-z" min="0" max="10" step="0.01" />
          <input type="number" id="stretch-z-input" step="0.01" />
        </div>
      </div>

      <div class="controls-group">
        <div class="controls-section-title">View</div>
        <label><input type="checkbox" id="toggle-autorotate" /> Auto-rotate</label>
        <label><input type="checkbox" id="toggle-axes" checked /> Show axes helper</label>
        <label><input type="checkbox" id="toggle-wireframe" /> Wireframe mode</label>
      </div>
      <div class="controls-group">
        <div class="controls-section-title">Lighting</div>
        <div class="stretch-row">
          <label for="light-ambient-intensity">Ambient</label>
          <input
            type="range"
            id="light-ambient-intensity"
            min="0"
            max="4"
            step="0.01" />
          <span class="value-display" id="light-ambient-intensity-value"></span>
        </div>
        <div class="stretch-row">
          <label for="light-key-intensity">Key</label>
          <input
            type="range"
            id="light-key-intensity"
            min="0"
            max="4"
            step="0.01" />
          <span class="value-display" id="light-key-intensity-value"></span>
        </div>
        <div class="stretch-row">
          <label for="light-fill-intensity">Fill/Rim</label>
          <input
            type="range"
            id="light-fill-intensity"
            min="0"
            max="4"
            step="0.01" />
          <span class="value-display" id="light-fill-intensity-value"></span>
        </div>
      </div>
      <div class="controls-group">
        <div class="controls-section-title">Pixel Art</div>
        <label><input type="checkbox" id="pixel-art-enable" checked /> Enable</label>
        <div class="stretch-row">
          <label for="pixel-art-color">Color</label>
          <input
            type="range"
            id="pixel-art-color"
            min="2"
            max="256"
            step="1"
            value="8" />
          <span class="value-display" id="pixel-art-color-value">8</span>
        </div>
        <div class="stretch-row">
          <label for="pixel-art-amount">Amount</label>
          <input
            type="range"
            id="pixel-art-amount"
            min="1"
            max="32"
            step="1"
            value="4" />
          <span class="value-display" id="pixel-art-amount-value">4</span>
        </div>
      </div>
      <div class="controls-group">
        <div class="controls-section-title">Environment</div>
        <div class="stretch-row">
          <label for="env-reflection">Reflection</label>
          <input
            type="range"
            id="env-reflection"
            min="0"
            max="5"
            step="0.01"
          />
          <span class="value-display" id="env-reflection-value"></span>
        </div>
        <div class="stretch-row">
          <label for="env-exposure">Exposure</label>
          <input
            type="range"
            id="env-exposure"
            min="0.5"
            max="3"
            step="0.01"
          />
          <span class="value-display" id="env-exposure-value"></span>
        </div>
        <div class="stretch-row">
          <label for="env-background-color">Background</label>
          <input
            type="color"
            id="env-background-color"
            value="#ffffff"
          />
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="main.js?v=2"></script>
</body>
</html>
