<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spam Can Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; }
    canvas { display: block; }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1.2rem;
      color: #888;
      z-index: 10;
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .stretch-panel {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.9rem;
      color: #333;
      background: rgba(255,255,255,0.9);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .stretch-panel.hidden { display: none; }
    .stretch-panel label { display: flex; align-items: center; gap: 0.5rem; }
    .stretch-panel input[type="range"] { width: 120px; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loading">Loading model…</div>
  <div id="stretch-panel" class="stretch-panel hidden">
    <label>X stretch <input type="range" id="stretch-x" min="0" max="10" step="0.01" /></label>
    <label>Y stretch <input type="range" id="stretch-y" min="0" max="10" step="0.01" /></label>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
