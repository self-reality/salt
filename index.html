<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spam Can Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; }
    canvas { display: block; }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1.2rem;
      color: #888;
      z-index: 10;
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .controls-panel {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.9rem;
      color: #333;
      background: rgba(255,255,255,0.9);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .controls-panel label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }
    .controls-panel input[type="file"] {
      font-size: 0.85rem;
    }
    .controls-panel button {
      font-size: 0.85rem;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
    }
    .controls-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .controls-section-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .stretch-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .stretch-row label {
      min-width: 3.2rem;
    }
    .stretch-row input[type="range"] {
      flex: 1;
    }
    .stretch-row input[type="number"] {
      width: 4.2rem;
      padding: 0.1rem 0.25rem;
      font-size: 0.85rem;
    }
    .hidden {
      display: none;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loading">Loading model…</div>
  <div id="controls-panel" class="controls-panel">
    <div class="controls-group">
      <div class="controls-section-title">Artwork</div>
      <label>
        Artwork image
        <input type="file" id="decal-file" accept="image/*" />
      </label>
      <div>Placed at (167,504), size 227×256</div>
      <button type="button" id="download-texture">Download texture PNG</button>
    </div>

    <div id="stretch-section" class="controls-group hidden">
      <div class="controls-section-title">Stretch</div>
      <div class="stretch-row">
        <label for="stretch-x">X</label>
        <input type="range" id="stretch-x" min="0" max="10" step="0.01" />
        <input type="number" id="stretch-x-input" step="0.01" />
      </div>
      <div class="stretch-row">
        <label for="stretch-y">Y</label>
        <input type="range" id="stretch-y" min="0" max="10" step="0.01" />
        <input type="number" id="stretch-y-input" step="0.01" />
      </div>
      <div class="stretch-row">
        <label for="stretch-z">Z</label>
        <input type="range" id="stretch-z" min="0" max="10" step="0.01" />
        <input type="number" id="stretch-z-input" step="0.01" />
      </div>
    </div>

    <div class="controls-group">
      <div class="controls-section-title">View</div>
      <label><input type="checkbox" id="toggle-autorotate" /> Auto-rotate</label>
      <label><input type="checkbox" id="toggle-axes" checked /> Show axes helper</label>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
