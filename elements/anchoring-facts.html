<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anchoring facts (canvas)</title>
  <style>
    /* "Anchoring facts" — Figma node 2062:1176 (Latent-space crawler).
       The table itself is laid out and painted to <canvas> by
       lib/anchoring-facts.js; this page is just the dev harness around it.
       Drag the right edge to change the canvas's natural width — the table
       reflows the same way the band height drives it inside label.html. */

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      padding: 40px;
      background: #e9eaec;
      font-family: Helvetica, Arial, sans-serif;
      color: #272727;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .hint { font-size: 13px; color: #6b7280; max-width: 60ch; }
    .hint code { background: #d6d8db; padding: 1px 5px; border-radius: 4px; }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 13px;
      color: #272727;
    }
    .toolbar label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }

    /* Canvas wrapper. The wrapper's CSS width is the table's natural width
       (1 css px ↔ 1 canvas px); a right-edge handle drags that width. */
    #wrap {
      position: relative;
      width: 870px;
      min-width: 200px;
      max-width: 2000px;
      height: 416px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.15);
    }

    /* Inspect-style dev overlays — ruler across the top edge plus dashed
       brackets naming the left and right columns. Sit above the canvas so
       they're visible while debugging; toggled off via the #wrap class. */
    #ruler {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 18px;
      z-index: 3;
      pointer-events: none;
      background: rgba(20, 24, 30, 0.82);
    }
    #col-brackets {
      position: absolute;
      left: 0;
      right: 0;
      top: 18px;
      height: 22px;
      z-index: 3;
      pointer-events: none;
    }
    .col-bracket {
      position: absolute;
      top: 0;
      height: 22px;
      border-left: 1px dashed #2b6cff;
      border-right: 1px dashed #2b6cff;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .col-bracket > span {
      font: 11px/1 Helvetica, Arial, sans-serif;
      color: #2b6cff;
      background: rgba(255, 255, 255, 0.92);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid #2b6cff;
    }
    /* Short dashed verticals dropping into the canvas from each column edge —
       like Chrome's inspect alignment ticks. */
    #col-ticks {
      position: absolute;
      left: 0;
      right: 0;
      top: 40px;
      height: 18px;
      z-index: 3;
      pointer-events: none;
    }
    .v-tick {
      position: absolute;
      top: 0;
      width: 0;
      height: 100%;
      border-left: 1px dashed rgba(43, 108, 255, 0.7);
    }
    #wrap:not(.show-guides) #ruler,
    #wrap:not(.show-guides) #col-brackets,
    #wrap:not(.show-guides) #col-ticks { display: none; }
    #cv {
      display: block;
      width: 100%;
      height: 100%;
      /* faint checker so the paper edges are visible against the page */
      background:
        repeating-conic-gradient(#e9e9e9 0% 25%, #f7f7f7 0% 50%) 0 / 24px 24px;
    }
    #ruler { display: block; }
    #handle {
      position: absolute;
      top: 0;
      bottom: 0;
      right: -7px;
      width: 14px;
      cursor: ew-resize;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    #handle::before {
      content: '';
      width: 6px;
      height: 64px;
      border-radius: 3px;
      background: #2b6cff;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.85);
    }

    .readout { font-size: 13px; color: #6b7280; font-variant-numeric: tabular-nums; }
    .readout strong { color: #272727; }
  </style>
</head>
<body>
  <p class="hint">
    Drag the right edge to resize. The table is laid out and painted directly
    to <code>&lt;canvas&gt;</code> by <code>lib/anchoring-facts.js</code> — no
    <code>&lt;foreignObject&gt;</code>, so the result drops cleanly into
    <code>label.html</code> and the WebGL textures without canvas taint.
  </p>

  <div class="toolbar">
    <label><input type="checkbox" id="toggle-guides" checked> Show inspect guides (ruler + column names)</label>
  </div>

  <div id="wrap" class="show-guides">
    <canvas id="cv"></canvas>
    <canvas id="ruler"></canvas>
    <div id="col-brackets">
      <div class="col-bracket" id="bracket-left"><span>Left column</span></div>
      <div class="col-bracket" id="bracket-right"><span>Right column</span></div>
    </div>
    <div id="col-ticks">
      <div class="v-tick" id="tick-left-start"></div>
      <div class="v-tick" id="tick-divider"></div>
      <div class="v-tick" id="tick-right-end"></div>
    </div>
    <div id="handle" title="Drag to resize the table width"></div>
  </div>

  <p class="readout">Canvas: <strong id="readout">—</strong></p>

  <script type="module">
    import { createAnchoringFacts } from '../lib/anchoring-facts.js';

    const wrap    = document.getElementById('wrap');
    const handle  = document.getElementById('handle');
    const display = document.getElementById('cv');
    const readout = document.getElementById('readout');
    const ctx     = display.getContext('2d');

    const rulerCv      = document.getElementById('ruler');
    const rulerCtx     = rulerCv.getContext('2d');
    const bracketLeft  = document.getElementById('bracket-left');
    const bracketRight = document.getElementById('bracket-right');
    const tickStart    = document.getElementById('tick-left-start');
    const tickDivider  = document.getElementById('tick-divider');
    const tickEnd      = document.getElementById('tick-right-end');
    const toggle       = document.getElementById('toggle-guides');

    toggle.addEventListener('change', () => {
      wrap.classList.toggle('show-guides', toggle.checked);
    });

    // Horizontal pixel ruler painted onto its own canvas. Ticks every 10 px,
    // labelled every 50 px. Redrawn whenever `length` changes.
    function paintRuler(L) {
      const dpr = window.devicePixelRatio || 1;
      const h = 18;
      rulerCv.width  = L * dpr;
      rulerCv.height = h * dpr;
      rulerCv.style.width  = L + 'px';
      rulerCv.style.height = h + 'px';
      rulerCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      rulerCtx.clearRect(0, 0, L, h);
      rulerCtx.strokeStyle = 'rgba(207, 210, 214, 0.95)';
      rulerCtx.fillStyle   = 'rgba(207, 210, 214, 0.95)';
      rulerCtx.lineWidth = 1;
      rulerCtx.font = '9px Helvetica, Arial, sans-serif';
      rulerCtx.textBaseline = 'top';
      for (let x = 0; x <= L; x += 10) {
        const major = x % 50 === 0;
        const tickH = major ? 8 : 4;
        rulerCtx.beginPath();
        rulerCtx.moveTo(x + 0.5, h - tickH);
        rulerCtx.lineTo(x + 0.5, h);
        rulerCtx.stroke();
        if (major && x > 0 && x < L) rulerCtx.fillText(String(x), x + 2, 2);
      }
    }

    function positionGuides(L) {
      const lay = renderer.getLayout(L);
      bracketLeft.style.left  = '0px';
      bracketLeft.style.width = lay.colDivider + 'px';
      bracketRight.style.left  = lay.colDivider + 'px';
      bracketRight.style.width = (L - lay.colDivider) + 'px';
      tickStart.style.left   = lay.leftColStart + 'px';
      tickDivider.style.left = lay.colDivider + 'px';
      tickEnd.style.left     = lay.rightColEnd + 'px';
    }

    // Logo sits next to this page (elements/SM-logo-600-px.png), so basePath
    // is empty — fetched relative to elements/anchoring-facts.html.
    const renderer = createAnchoringFacts({ basePath: '' });
    let length = Math.round(wrap.getBoundingClientRect().width);
    let pending = false;

    function paint() {
      pending = false;
      renderer.render(length).then((src) => {
        display.width  = src.width;
        display.height = src.height;
        ctx.drawImage(src, 0, 0);
        readout.textContent = `${src.width} × ${src.height} px`;
        paintRuler(length);
        positionGuides(length);
      });
    }
    // Coalesce drag-driven renders to one per frame.
    function schedulePaint() {
      if (pending) return;
      pending = true;
      requestAnimationFrame(paint);
    }

    renderer.load().then(paint, (err) => {
      readout.textContent = 'load failed: ' + (err && err.message || err);
    });

    let dragging = false;
    handle.addEventListener('pointerdown', (e) => {
      dragging = true;
      handle.setPointerCapture(e.pointerId);
    });
    handle.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const rect = wrap.getBoundingClientRect();
      length = Math.max(200, Math.min(2000, Math.round(e.clientX - rect.left)));
      wrap.style.width = length + 'px';
      schedulePaint();
    });
    const endDrag = (e) => {
      if (!dragging) return;
      dragging = false;
      try { handle.releasePointerCapture(e.pointerId); } catch (_) {}
    };
    handle.addEventListener('pointerup', endDrag);
    handle.addEventListener('pointercancel', endDrag);
  </script>
</body>
</html>
